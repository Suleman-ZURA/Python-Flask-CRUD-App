name: CI/CD - Build and Push Docker Image

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Log in to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build Docker image
        run: docker build -t ahmedfida2/flask-crud-app:latest ./app/flask-api

      - name: Push Docker image to DockerHub
        run: docker push ahmedfida2/flask-crud-app:latest

      - name: Confirm success
        run: echo "Docker image pushed to DockerHub successfully"
